# =============================================================================
# DPO Training Configuration (Alternative to GRPO)
# =============================================================================

# Model
base_model: SFT-or-GRPO-checkpoint
training_type: lora

# Data
data: dpo_pairs.jsonl  # Preference pairs (chosen vs rejected)
# Generated by: scripts/06_generate_dpo_data.sh

# DPO Config
beta: 0.1  # Inverse temperature for preference
lora_rank: 64
max_seq_length: 4096
max_prompt_length: 1024

# Training
learning_rate: 5e-7
lr_scheduler: cosine
warmup_ratio: 0.1
num_epochs: 1
batch_size: 2
gradient_accumulation_steps: 4

# Notes
# - DPO is an offline preference optimization method
# - In our experiments, GRPO (online) outperforms DPO (offline) for math
# - DPO from GRPO-best: 60.40% vs GRPO: 61.40%
# - DPO is useful when online generation is too expensive
